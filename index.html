<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYLR Radio | The Beat of Your Life</title>
    <style>
        :root {
            --bg: #111827; /* Dark charcoal */
            --primary: #fb923c; /* Bright Orange "ON AIR" */
            --accent: #facc15; /* Yellow/Gold */
            --slate: #4b5563;
            --text-on-dark: #f9fafb;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', 'Helvetica Neue', sans-serif;
            background-color: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text-on-dark);
        }

        /* Floating Radios Background */
        .radio-waves {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        .radio-icon {
            position: absolute;
            font-size: 2.5rem;
            user-select: none;
            animation: spin-float 12s infinite linear;
            filter: drop-shadow(0 0 10px rgba(251, 146, 60, 0.3));
        }

        @keyframes spin-float {
            0% {
                transform: translateY(110vh) translateX(0) rotate(0deg);
                opacity: 0;
            }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% {
                transform: translateY(-20vh) translateX(30px) rotate(360deg);
                opacity: 0;
            }
        }

        /* The Tuner / Card */
        .card {
            background: rgba(255, 255, 255, 0.05); /* Frosted Glass */
            backdrop-filter: blur(10px);
            padding: 3rem 2rem;
            border-radius: 28px;
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.5);
            text-align: center;
            max-width: 380px;
            width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.1);
            animation: tunerPowerOn 0.9s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            z-index: 10;
        }

        @keyframes tunerPowerOn {
            from { transform: scale(0.8) translateY(40px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .on-air-signal {
            display: inline-block;
            background: #ef4444; /* Critical Red */
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            text-transform: uppercase;
            animation: signalPulse 1.5s infinite;
        }

        @keyframes signalPulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .brand {
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--primary);
            margin-bottom: 0.75rem;
            letter-spacing: -1.5px;
            text-shadow: 0 0 15px rgba(251, 146, 60, 0.5);
        }

        h1 {
            font-size: 1.2rem;
            margin-bottom: 1rem;
            line-height: 1.3;
            color: #e5e7eb;
        }

        p {
            font-size: 0.9rem;
            color: #9ca3af;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Animated Pulsing Buttons */
        .btn {
            display: inline-block;
            background: var(--primary);
            color: #fff;
            padding: 0.8rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 2;
            box-shadow: 0 4px 15px rgba(251, 146, 60, 0.4);
        }

        /* Inner Pulse Animation */
        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: inherit;
            border-radius: inherit;
            z-index: -1;
            opacity: 0.7;
            animation: btnPulse 1.8s infinite;
        }

        @keyframes btnPulse {
            0% { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(250, 204, 21, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .footer-freq {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: var(--slate);
            letter-spacing: 1px;
            text-transform: uppercase;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="radio-waves">
        <div class="radio-icon" style="left: 10%; animation-delay: 0s;">📻</div>
        <div class="radio-icon" style="left: 35%; animation-delay: 4s; font-size: 1.8rem;">📻</div>
        <div class="radio-icon" style="left: 60%; animation-delay: 8s; font-size: 3rem;">📻</div>
        <div class="radio-icon" style="left: 80%; animation-delay: 2s;">📻</div>
        <div class="radio-icon" style="left: 20%; animation-delay: 6s; font-size: 2rem;">📻</div>
        <div class="radio-icon" style="left: 50%; animation-delay: 10s;">📻</div>
    </div>

    <div class="card">
        <div class="on-air-signal">LIVE ON AIR</div>
        <div class="brand">BYLR RADIO</div>
        <h1>The Sound<br>of Your Community</h1>
        <p>Broadcasting the best local talent, news, and tunes straight to your speakers. Tune in and feel the pulse. Hahaha!</p>
        
        <a href="#" class="btn">LISTEN LIVE</a>

        <div class="footer-freq">
            104.5 FM TULSA • EST. 2026
        </div>
    </div>

</body>
</html>
